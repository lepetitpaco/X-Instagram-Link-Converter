<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 12px;
      width: 320px;
      margin: 0;
      max-height: 600px;
      overflow-y: auto;
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .stats {
      background-color: #f0f0f0;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .stats-item {
      margin: 4px 0;
      color: #666;
    }

    .stats-item strong {
      color: #333;
    }

    button {
      width: 100%;
      margin: 5px 0;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background-color: #1d9bf0;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background-color: #1a8cd8;
    }

    button:active {
      background-color: #1579b8;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      min-height: 20px;
    }

    .status-success {
      background-color: #d4edda;
      color: #155724;
    }

    .status-error {
      background-color: #f8d7da;
      color: #721c24;
    }

    .divider {
      height: 1px;
      background-color: #e0e0e0;
      margin: 8px 0;
    }

    .section {
      margin-bottom: 12px;
    }

    .settings-section {
      margin-top: 12px;
    }

    .setting-item {
      display: flex;
      align-items: center;
      margin: 6px 0;
      font-size: 12px;
    }

    .setting-item input[type="checkbox"] {
      margin-right: 8px;
      cursor: pointer;
    }

    .setting-item label {
      cursor: pointer;
      flex: 1;
    }

    .history-section {
      margin-top: 12px;
    }

    .history-item {
      padding: 8px;
      margin: 4px 0;
      background-color: #f9f9f9;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .history-item:hover {
      background-color: #f0f0f0;
    }

    .history-item-domain {
      font-weight: 600;
      color: #1d9bf0;
      margin-bottom: 4px;
    }

    .history-item-url {
      color: #666;
      word-break: break-all;
      font-size: 10px;
    }

    .history-empty {
      text-align: center;
      color: #999;
      font-size: 12px;
      padding: 12px;
    }

    .clear-history {
      margin-top: 8px;
      font-size: 11px;
      padding: 6px;
      background-color: #f0f0f0;
    }

    .clear-history:hover {
      background-color: #e0e0e0;
    }
  </style>
</head>

<body>
  <div class="stats" id="stats">
    <div class="stats-item"><strong>Total:</strong> <span id="stats-total">0</span></div>
    <div class="stats-item"><strong>Aujourd'hui:</strong> <span id="stats-today">0</span></div>
    <div class="stats-item"><strong>X:</strong> <span id="stats-x">0</span> | <strong>Instagram:</strong> <span id="stats-instagram">0</span></div>
  </div>

  <div class="section">
    <h3>X / Twitter</h3>
    <button id="copy-fixvx" data-domain="fixvx">📋 Copy fixvx link</button>
    <button id="copy-fixupx" data-domain="fixupx">📋 Copy fixupx link</button>
    <button id="copy-vxtwitter" data-domain="vxtwitter">📋 Copy vxtwitter link</button>
  </div>

  <div class="divider"></div>

  <div class="section">
    <h3>Instagram</h3>
    <button id="copy-kkinstagram" data-domain="kkinstagram">📷 Copy kkinstagram link</button>
  </div>

  <div class="divider"></div>

  <div class="settings-section">
    <h3>Options</h3>
    <div class="setting-item">
      <input type="checkbox" id="setting-fixvx" checked>
      <label for="setting-fixvx">Afficher fixvx</label>
    </div>
    <div class="setting-item">
      <input type="checkbox" id="setting-fixupx" checked>
      <label for="setting-fixupx">Afficher fixupx</label>
    </div>
    <div class="setting-item">
      <input type="checkbox" id="setting-vxtwitter" checked>
      <label for="setting-vxtwitter">Afficher vxtwitter</label>
    </div>
    <div class="setting-item">
      <input type="checkbox" id="setting-kkinstagram" checked>
      <label for="setting-kkinstagram">Afficher kkinstagram</label>
    </div>
  </div>

  <div class="divider"></div>

  <div class="history-section">
    <h3>Historique</h3>
    <div id="history-container">
      <div class="history-empty">Aucune conversion récente</div>
    </div>
    <button class="clear-history" id="clear-history">Effacer l'historique</button>
  </div>

  <div id="status"></div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>

</html>
